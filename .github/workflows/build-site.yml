name: Build Hyper2 Site

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          R -q -e 'install.packages(c("rmarkdown", "digest"))'

      - name: Render site
        run: |
          R -q -e "source('inst/build_site.R')"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
