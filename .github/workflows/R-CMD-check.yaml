# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# for debugging help, https://github.com/r-lib/actions#where-to-find-help

name: R-CMD-check-hyper2

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]
  workflow_dispatch:

env:
  R_MAKEVARS_USER: ~/.R/Makevars
  PKG_CPPFLAGS: "-mcmodel=medium"
  CFLAGS: "-mcmodel=medium"
  CXXFLAGS: "-mcmodel=medium"

jobs:
  check:
    uses: robinhankin/workflow/.github/workflows/R-CMD-check.yaml@master
      extra-steps: |
        - name: Set compiler flags for large objects
          run: |
            mkdir -p ~/.R
            cat <<EOF > ~/.R/Makevars
            CFLAGS=-mcmodel=medium
            CXXFLAGS=-mcmodel=medium
            CXX11FLAGS=-mcmodel=medium
            CXX14FLAGS=-mcmodel=medium
            CXX17FLAGS=-mcmodel=medium
            FFLAGS=-mcmodel=medium
            FCFLAGS=-mcmodel=medium
            EOF
